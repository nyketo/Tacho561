<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tacho 561</title>
<meta name="theme-color" content="#12161d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tacho 561">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2312161d'/%3E%3Ccircle cx='90' cy='90' r='58' fill='none' stroke='%23f2994a' stroke-width='10'/%3E%3Cpath d='M90 52v40l26 16' fill='none' stroke='%23f2994a' stroke-width='11' stroke-linecap='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--mono:'JetBrains Mono',monospace;--display:'Oswald',sans-serif;--body:'Inter',sans-serif;}
html[data-theme="night"]{
  --bg:#12161d;--bg-grad:#171d27;--bg-panel:#1a2029;--bg-panel-2:#212836;--bg-raised:#252d3b;
  --border:#2c3444;--border-soft:#232a37;
  --text:#eef1f6;--text-dim:#93a0b3;--text-faint:#5c6a80;
  --accent:#f2994a;--accent-ink:#20140a;--accent-dim:#8a5a2c;
  --ok:#4cb37f;--ok-bg:#173325;--warn:#e0a83e;--warn-bg:#332a12;--bad:#e15b5b;--bad-bg:#3a1a1a;
  --info:#5b8def;--info-bg:#16233d;
  --shadow:none;--picker-filter:invert(0.7);
}
html[data-theme="day"]{
  --bg:#f4f5f7;--bg-grad:#ffffff;--bg-panel:#ffffff;--bg-panel-2:#f7f8fa;--bg-raised:#eceef2;
  --border:#d8dce3;--border-soft:#e6e9ee;
  --text:#1b2029;--text-dim:#5d6878;--text-faint:#8d97a6;
  --accent:#c26a19;--accent-ink:#ffffff;--accent-dim:#e0a06a;
  --ok:#1e7d52;--ok-bg:#e2f3ea;--warn:#9a6c07;--warn-bg:#fbf0d5;--bad:#b52a2a;--bad-bg:#fbe4e4;
  --info:#2d5fb8;--info-bg:#e5edfb;
  --shadow:0 1px 3px rgba(20,26,40,.06);--picker-filter:none;
}
html[data-theme="paper"]{
  --bg:#f6efdd;--bg-grad:#fffcf3;--bg-panel:#fffcf3;--bg-panel-2:#f1e6cc;--bg-raised:#e9dab5;
  --border:#d8c295;--border-soft:#e7d7ae;
  --text:#241a0c;--text-dim:#5c4a2c;--text-faint:#8a7550;
  --accent:#a2540f;--accent-ink:#fffaf0;--accent-dim:#cf8f4b;
  --ok:#256b41;--ok-bg:#dcefdf;--warn:#8a5f06;--warn-bg:#f6e8bf;--bad:#9c2a24;--bad-bg:#f4dcd6;
  --info:#254f8f;--info-bg:#dde6f6;
  --shadow:0 1px 4px rgba(60,40,10,.12);--picker-filter:none;
}
html[data-theme="ocean"]{
  --bg:#eef7f9;--bg-grad:#ffffff;--bg-panel:#ffffff;--bg-panel-2:#e3f2f5;--bg-raised:#d3ecef;
  --border:#b8dde3;--border-soft:#cfe9ed;
  --text:#0d2b31;--text-dim:#3f6a72;--text-faint:#7a9ea4;
  --accent:#0e7c86;--accent-ink:#ffffff;--accent-dim:#6bb3ba;
  --ok:#1e7d52;--ok-bg:#e2f3ea;--warn:#9a6c07;--warn-bg:#fbf0d5;--bad:#b52a2a;--bad-bg:#fbe4e4;
  --info:#2d5fb8;--info-bg:#e5edfb;
  --shadow:0 1px 3px rgba(10,40,45,.06);--picker-filter:none;
}
html[data-theme="dusk"]{
  --bg:#1c130d;--bg-grad:#241a11;--bg-panel:#2a1e14;--bg-panel-2:#33251a;--bg-raised:#3d2c1e;
  --border:#4d3a26;--border-soft:#3a2c1e;
  --text:#f6e9d8;--text-dim:#c2a583;--text-faint:#8a6f52;
  --accent:#e6883a;--accent-ink:#1c1108;--accent-dim:#9c6a37;
  --ok:#7fb37f;--ok-bg:#26301f;--warn:#e0b158;--warn-bg:#35280f;--bad:#e0776b;--bad-bg:#3a1d17;
  --info:#87a6e6;--info-bg:#1e2436;
  --shadow:none;--picker-filter:invert(0.75) sepia(0.3);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:radial-gradient(ellipse at top,var(--bg-grad) 0%,var(--bg) 55%);color:var(--text);font-family:var(--body);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
.app{max-width:940px;margin:0 auto;padding:20px 16px calc(80px + env(safe-area-inset-bottom));}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:44px;height:44px;border-radius:50%;background:conic-gradient(from -90deg,var(--accent) 0deg,var(--accent) 30deg,var(--border-soft) 30deg);display:flex;align-items:center;justify-content:center;flex:none;position:relative;}
.brand-mark::before{content:'';position:absolute;inset:5px;border-radius:50%;background:var(--bg-panel);}
.brand-mark svg{position:relative;width:20px;height:20px;z-index:1;}
.brand h1{font-family:var(--display);font-weight:600;font-size:19px;margin:0;letter-spacing:.3px;}
.brand p{margin:0;font-size:11.5px;color:var(--text-faint);letter-spacing:.4px;text-transform:uppercase;}
.ctrls{display:flex;gap:6px;align-items:center;}
.seg-switch{display:flex;gap:2px;background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:8px;padding:3px;box-shadow:var(--shadow);}
.seg-switch button{background:transparent;border:none;color:var(--text-dim);font-family:var(--mono);font-size:11px;font-weight:700;padding:5px 7px;border-radius:6px;cursor:pointer;line-height:1;}
.seg-switch button.active{background:var(--bg-raised);color:var(--accent);}
.seg-switch button svg{width:13px;height:13px;display:block;}
.vehicle-banner{display:flex;align-items:center;justify-content:space-between;gap:10px;background:var(--bg-panel);border:1px solid var(--border-soft);border-left:3px solid var(--accent);border-radius:10px;padding:10px 12px;margin-bottom:16px;box-shadow:var(--shadow);}
.vb-l{display:flex;flex-direction:column;gap:2px;min-width:0;}
.vb-cap{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);}
.vb-plate{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--accent);letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vehicle-banner button{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:12px;font-weight:600;padding:7px 11px;border-radius:8px;cursor:pointer;white-space:nowrap;font-family:var(--body);}
.vehicle-banner button:hover{border-color:var(--accent);color:var(--text);}
.tabs{display:flex;gap:3px;background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:12px;padding:4px;margin-bottom:18px;box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab-btn{flex:1;min-width:74px;padding:10px 6px;border:none;background:transparent;color:var(--text-dim);font-family:var(--body);font-weight:600;font-size:12px;border-radius:9px;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:var(--bg-raised);color:var(--text);box-shadow:0 0 0 1px var(--border);}
.view{display:none;}
.view.active{display:block;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
.card{background:var(--bg-panel);border:1px solid var(--border-soft);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:var(--shadow);}
.card h2{font-family:var(--display);font-size:14px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;color:var(--text-dim);margin:0 0 12px;}
.gauge-row{display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;}
.gauge-box{flex:1;min-width:130px;display:flex;flex-direction:column;align-items:center;text-align:center;}
.gauge-box svg{width:100%;max-width:150px;height:auto;}
.gauge-label{font-size:11.5px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;}
.pill{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;font-family:var(--mono);}
.pill.ok{background:var(--ok-bg);color:var(--ok);}
.pill.warn{background:var(--warn-bg);color:var(--warn);}
.pill.bad{background:var(--bad-bg);color:var(--bad);}
.pill.info{background:var(--info-bg);color:var(--info);}
.tokens{display:flex;gap:5px;align-items:center;}
.tok{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border);background:transparent;}
.tok.used{background:var(--accent);border-color:var(--accent);}
.tok.free{background:var(--ok-bg);border-color:var(--ok);}
.allow-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border-soft);}
.allow-row:last-child{border-bottom:none;}
.allow-l{display:flex;flex-direction:column;gap:2px;min-width:0;}
.allow-l b{font-size:13px;font-weight:600;}
.allow-l span{font-size:11px;color:var(--text-faint);}
.allow-r{display:flex;align-items:center;gap:8px;flex:none;}
.strip-wrap{overflow-x:auto;padding-bottom:4px;}
.strip{display:flex;gap:3px;min-width:min-content;align-items:flex-end;height:86px;padding:6px 2px 0;border-bottom:1px dashed var(--border);}
.strip-col{width:22px;flex:none;display:flex;flex-direction:column;align-items:center;gap:4px;}
.strip-bar{width:14px;border-radius:3px 3px 0 0;background:var(--ok);}
.strip-bar.warn{background:var(--warn);}
.strip-bar.bad{background:var(--bad);}
.strip-bar.exempt{background:var(--info);}
.strip-date{font-family:var(--mono);font-size:8.5px;color:var(--text-faint);white-space:nowrap;}
label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:5px;font-weight:600;}
input,select,textarea{width:100%;background:var(--bg-panel-2);border:1px solid var(--border);color:var(--text);padding:9px 10px;border-radius:8px;font-family:var(--body);font-size:15px;margin-bottom:12px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);}
input[type=date]::-webkit-calendar-picker-indicator,input[type=time]::-webkit-calendar-picker-indicator{filter:var(--picker-filter);}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:2fr 1fr;gap:12px;}
@media (max-width:480px){.field-row,.field-row3{grid-template-columns:1fr;}}
.hint{font-size:11px;color:var(--text-faint);margin:-8px 0 12px;line-height:1.45;}
.calc-out{font-family:var(--mono);font-size:12px;color:var(--accent);margin:-6px 0 12px;font-weight:600;}
button.primary{width:100%;background:var(--accent);color:var(--accent-ink);border:none;padding:13px;border-radius:9px;font-family:var(--display);font-weight:600;font-size:14.5px;letter-spacing:.3px;cursor:pointer;text-transform:uppercase;}
button.primary:hover{filter:brightness(1.08);}
button.secondary{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-dim);padding:10px;border-radius:9px;font-family:var(--body);font-weight:600;font-size:13px;cursor:pointer;margin-bottom:12px;}
button.secondary:hover{border-color:var(--accent);color:var(--text);border-style:solid;}
.segment{background:var(--bg-panel-2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;}
.segment-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.segment-head b{font-family:var(--display);font-size:13px;letter-spacing:.4px;color:var(--accent);}
.seg-remove{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:15px;padding:2px 6px;}
.seg-remove:hover{color:var(--bad);}
.subhead{font-family:var(--display);font-size:12px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border-soft);}
.exc-block{background:var(--bg-panel-2);border:1px solid var(--border-soft);border-radius:10px;padding:11px 12px;margin-bottom:10px;}
.exc-head{display:flex;align-items:flex-start;gap:9px;}
.exc-head input{width:auto;margin:3px 0 0;flex:none;}
.exc-head .exc-t{flex:1;min-width:0;}
.exc-head b{font-size:13px;display:block;}
.exc-head span{font-size:11px;color:var(--text-faint);display:block;margin-top:2px;line-height:1.4;}
.exc-body{margin-top:11px;padding-top:11px;border-top:1px dashed var(--border);display:none;}
.exc-block.on .exc-body{display:block;}
.exc-block.on{border-color:var(--accent-dim);}
.result{border:1px solid var(--accent-dim);background:linear-gradient(180deg,rgba(242,153,74,.08),transparent);border-radius:12px;padding:14px;margin-top:14px;}
.result h3{margin:0 0 10px;font-family:var(--display);font-size:14px;letter-spacing:.3px;color:var(--accent);text-transform:uppercase;}
.res-line{display:flex;justify-content:space-between;font-size:13px;padding:6px 0;border-bottom:1px solid var(--border-soft);gap:10px;}
.res-line:last-child{border-bottom:none;}
.res-line span:first-child{color:var(--text-dim);}
.res-line span:last-child{font-family:var(--mono);font-weight:600;text-align:right;}
.big-stat{display:flex;flex-direction:column;align-items:center;padding:14px 8px;background:var(--bg-panel-2);border:1px solid var(--border-soft);border-radius:12px;}
.big-stat .v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);}
.big-stat .l{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:.5px;margin-top:4px;text-align:center;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
@media (max-width:520px){.stat-grid{grid-template-columns:repeat(2,1fr);}}
.log-entry{border:1px solid var(--border-soft);border-radius:12px;margin-bottom:10px;background:var(--bg-panel-2);overflow:hidden;}
.log-sum{padding:12px 14px;cursor:pointer;}
.log-sum:hover{background:var(--bg-raised);}
.log-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
.log-date{font-family:var(--display);font-weight:600;font-size:14.5px;display:flex;align-items:center;gap:7px;}
.chev{transition:transform .18s;width:12px;height:12px;color:var(--text-faint);}
.log-entry.open .chev{transform:rotate(90deg);}
.log-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.log-stat{font-family:var(--mono);font-size:11.5px;color:var(--text-dim);background:var(--bg-raised);padding:3px 7px;border-radius:6px;}
.log-stat.plate{color:var(--accent);font-weight:700;}
.log-stat.exc{color:var(--info);}
.log-detail{display:none;padding:0 14px 14px;border-top:1px solid var(--border-soft);}
.log-entry.open .log-detail{display:block;}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}
@media (max-width:560px){.det-grid{grid-template-columns:1fr;}}
.det-sec{margin-top:12px;}
.det-sec h4{font-family:var(--display);font-size:11.5px;letter-spacing:.6px;text-transform:uppercase;color:var(--accent);margin:0 0 6px;}
.det-line{display:flex;justify-content:space-between;font-size:12.5px;padding:4px 0;gap:10px;border-bottom:1px solid var(--border-soft);}
.det-line:last-child{border-bottom:none;}
.det-line span:first-child{color:var(--text-dim);}
.det-line span:last-child{font-family:var(--mono);text-align:right;}
.det-actions{display:flex;gap:8px;margin-top:14px;}
.det-actions button{flex:1;padding:9px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:var(--body);font-size:12.5px;font-weight:600;cursor:pointer;}
.det-actions button.danger:hover{border-color:var(--bad);color:var(--bad);}
.det-note{font-size:12px;color:var(--text-dim);background:var(--bg-raised);padding:9px 10px;border-radius:8px;line-height:1.5;margin-top:8px;}
.viol-item{display:flex;gap:10px;padding:11px 0;border-bottom:1px solid var(--border-soft);}
.viol-item:last-child{border-bottom:none;}
.viol-dot{width:8px;height:8px;border-radius:50%;background:var(--bad);flex:none;margin-top:5px;}
.viol-dot.warn{background:var(--warn);}
.viol-dot.info{background:var(--info);}
.viol-body b{font-size:13.5px;}
.viol-body div{font-size:12px;color:var(--text-dim);margin-top:2px;line-height:1.45;}
.viol-art{font-family:var(--mono);font-size:10.5px;color:var(--text-faint);margin-top:3px;}
.empty{text-align:center;color:var(--text-faint);padding:30px 10px;font-size:13.5px;line-height:1.5;}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.checkbox-row input{width:auto;margin:0;}
.checkbox-row label{margin:0;}
.section-note{font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.5;}
.disclaimer{font-size:11px;color:var(--text-faint);line-height:1.55;margin-top:22px;padding-top:14px;border-top:1px solid var(--border-soft);}
.install-steps{font-size:12.5px;color:var(--text-dim);line-height:1.6;}
.install-steps b{color:var(--text);display:block;margin-top:10px;font-size:13px;}
#installBtn{display:none;}
.filterbar{display:flex;gap:8px;margin-bottom:12px;}
.filterbar input,.filterbar select{margin-bottom:0;}
.disc-wrap{display:flex;flex-direction:column;align-items:center;gap:10px;}
.disc-wrap svg{width:100%;max-width:280px;height:auto;}
.disc-legend{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;font-size:11.5px;color:var(--text-dim);}
.disc-legend span{display:inline-flex;align-items:center;gap:5px;}
.disc-legend i{width:11px;height:11px;border-radius:3px;display:inline-block;}
.disc-note{font-size:10.5px;color:var(--text-faint);text-align:center;line-height:1.4;}
.po-btn{width:100%;background:transparent;border:1px dashed var(--border);color:var(--text-dim);padding:9px;border-radius:8px;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;margin-top:10px;}
.po-btn:hover{border-color:var(--accent);color:var(--text);}
.printout{display:none;background:#fbfaf3;color:#15150f;font-family:var(--mono);font-size:12px;line-height:1.55;border-radius:4px;padding:16px 14px;margin-top:10px;white-space:pre-wrap;word-break:break-word;box-shadow:0 2px 10px rgba(0,0,0,.25);border-top:6px solid #e8e5d4;border-bottom:6px solid #e8e5d4;}
.printout.open{display:block;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M12 6v6l4 2"/></svg></div>
      <div><h1>Tacho 561</h1><p data-t="subtitle"></p></div>
    </div>
    <div class="ctrls">
      <div class="seg-switch" id="themepick">
        <button data-theme="day" title="Day"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
        <button data-theme="night" title="Night"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z"/></svg></button>
        <button data-theme="paper" title="Paper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2.5h8l5 5v14H6z"/><path d="M14 2.5v5h5M9 12h6M9 15.5h6M9 18.5h4"/></svg></button>
        <button data-theme="ocean" title="Ocean"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 16c1.5-1.6 3-1.6 4.5 0s3 1.6 4.5 0 3-1.6 4.5 0 3 1.6 4.5 0M2 20c1.5-1.6 3-1.6 4.5 0s3 1.6 4.5 0 3-1.6 4.5 0 3 1.6 4.5 0M12 3v9"/></svg></button>
        <button data-theme="dusk" title="Dusk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 4v3M5 11l1.6 1.6M19 11l-1.6 1.6M2.5 18h19M6.5 18a5.5 5.5 0 0111 0"/></svg></button>
        <button data-theme="auto" title="Auto">A</button>
      </div>
      <div class="seg-switch" id="langpick">
        <button data-lang="bg">BG</button><button data-lang="en">EN</button><button data-lang="de">DE</button>
      </div>

/* ============ Language & theme ============ */
let LANG='bg';
try{ const s=localStorage.getItem('t561-lang'); if(s&&T[s]) LANG=s; }catch(e){}
function t(k,p){ let s=T[LANG][k]; if(s===undefined) return k; if(typeof s!=='string') return s;
  if(p) for(const q in p) s=s.split('{'+q+'}').join(p[q]); return s; }

let THEME='auto';
try{ const s=localStorage.getItem('t561-theme'); if(s) THEME=s; }catch(e){}
function resolveTheme(){
  if(THEME!=='auto') return THEME;
  const h=new Date().getHours();
  const dark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  return (h>=20||h<7||dark)?'night':'day';
}
const THEME_BAR_COLOR={night:'#12161d',day:'#f4f5f7',paper:'#f6efdd',ocean:'#eef7f9',dusk:'#1c130d'};
function applyTheme(){
  const eff=resolveTheme();
  document.documentElement.setAttribute('data-theme',eff);
  const mt=document.querySelector('meta[name=theme-color]');
  if(mt) mt.setAttribute('content', THEME_BAR_COLOR[eff]||'#f4f5f7');
  document.querySelectorAll('#themepick button').forEach(b=>b.classList.toggle('active', b.dataset.theme===THEME));
}
setInterval(()=>{ if(THEME==='auto') applyTheme(); },60000);

/* ============ Storage ============ */
const KEY='t561-data-v4';
let DATA={ entries:[], compensations:[], currentPlate:'', lastCountry:'' };
const store={
  async get(k){
    if(window.storage&&window.storage.get){ try{ const r=await window.storage.get(k,false); return r&&r.value?r.value:null; }catch(e){} }
    try{ return localStorage.getItem(k); }catch(e){ return null; }
  },
  async set(k,v){
    if(window.storage&&window.storage.set){ try{ await window.storage.set(k,v,false); return; }catch(e){} }
    try{ localStorage.setItem(k,v); }catch(e){}
  }
};
async function loadData(){
  const raw=await store.get(KEY);
  if(raw){ try{ DATA=JSON.parse(raw); }catch(e){} }
  DATA.entries=DATA.entries||[]; DATA.compensations=DATA.compensations||[];
  DATA.currentPlate=DATA.currentPlate||''; DATA.lastCountry=DATA.lastCountry||'';
}
async function saveData(){ await store.set(KEY, JSON.stringify(DATA)); }

/* ============ Date / time ============ */
function toDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function isoWeekInfo(ds){
  const d=toDate(ds), tg=new Date(d.valueOf());
  tg.setDate(tg.getDate()-((d.getDay()+6)%7)+3);
  const ft=new Date(tg.getFullYear(),0,4);
  return { year:tg.getFullYear(), week:1+Math.round((tg-ft)/(7*864e5)) };
}
function weekKey(ds){ const w=isoWeekInfo(ds); return w.year+'-W'+String(w.week).padStart(2,'0'); }
function mondayOf(ds){ const d=toDate(ds); d.setDate(d.getDate()-((d.getDay()+6)%7)); return d; }
function sundayOf(ds){ const m=mondayOf(ds); const s=new Date(m); s.setDate(s.getDate()+6); return s; }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addWeeks(d,n){ const x=new Date(d); x.setDate(x.getDate()+n*7); return x; }
function hoursBetween(a,b){
  if(!a||!b) return 0;
  const [h1,m1]=a.split(':').map(Number),[h2,m2]=b.split(':').map(Number);
  let d=(h2*60+m2)-(h1*60+m1); if(d<0) d+=1440; return d/60;
}
function counterToMin(v){
  if(v===null||v===undefined||v==='') return null;
  const s=String(v).trim();
  if(s.includes(':')){ const p=s.split(':'); return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0); }
  const f=parseFloat(s); return isNaN(f)?null:Math.round(f*60);
}
function maskHM(raw){
  let d=String(raw==null?'':raw).replace(/[^0-9]/g,'');
  if(!d) return '';
  d=d.slice(0,6);
  if(d.length<=2) return d;
  return d.slice(0,-2)+':'+d.slice(-2);
}
function normalizeHM(v){
  const m=maskHM(v);
  if(!m) return '';
  if(!m.includes(':')) return m+':00';
  let p=m.split(':'), mm=p[1];
  if(+mm>59) mm='59';
  return p[0]+':'+mm.padStart(2,'0');
}
function minToHM(m){
  if(m===null||m===undefined||isNaN(m)) return '—';
  const sg=m<0?'-':''; m=Math.abs(m);
  return sg+Math.floor(m/60)+':'+String(Math.round(m%60)).padStart(2,'0');
}

/* ============ Derived per-segment values ============ */
function counterPair(startV,endV){
  let a=counterToMin(startV), b=counterToMin(endV);
  if(b===null) return null;      // no end value -> nothing to compute
  if(a===null) a=0;              // empty start means "counted from zero"
  return Math.max(0,b-a);
}
function segDrivingMin(s){ return counterPair(s.drvStart,s.drvEnd); }
function segRestMin(s){ return counterPair(s.restStart,s.restEnd); }
function segKm(s){ const a=parseFloat(s.odoStart),b=parseFloat(s.odoEnd); return (isNaN(a)||isNaN(b))?null:Math.max(0,b-a); }
function dayDrivingHours(e){ return (e.segments||[]).reduce((s,x)=>{const m=segDrivingMin(x); return s+(m===null?0:m/60);},0); }
function dayBreakMin(e){ return (e.segments||[]).reduce((s,x)=>{const m=segRestMin(x); return s+(m===null?0:m);},0); }
function dayKm(e){ return (e.segments||[]).reduce((s,x)=>{const k=segKm(x); return s+(k===null?0:k);},0); }
function isExempt(e){ const x=e.exc||{};
  return !!(x.oos&&x.oos.on) || !!(x.nat&&x.nat.on&&x.nat.full) || !!(x.aetr&&x.aetr.on); }

/* ============ Compliance engine ============ */
function computeAll(){
  const entries=[...DATA.entries].sort((a,b)=>a.date.localeCompare(b.date));
  const comps=[];
  let reducedDaily=0, periodsSinceWeekly=0, extByWeek={}, allViol=[], evals={};
  let weeklyRestHistory=[]; // {date, type, hours}
  let twelveDayActive=null;

  const weekSums={};
  entries.forEach(e=>{ if(!isExempt(e)){ const w=weekKey(e.date); weekSums[w]=(weekSums[w]||0)+dayDrivingHours(e); } });

  entries.forEach(e=>{
    const x=e.exc||{};
    const V=[], N=[], EXC=[];
    const wk=weekKey(e.date);
    extByWeek[wk]=extByWeek[wk]||0;
    const drv=dayDrivingHours(e), brk=dayBreakMin(e), km=dayKm(e);
    const workdayH=hoursBetween(e.start,e.end);
    const exempt=isExempt(e);

    // ---- exemptions that remove the day from 561 ----
    if(x.oos&&x.oos.on){ EXC.push({k:'oos',label:t('exc_oos_t'),info:x.oos.reason||''}); }
    if(x.nat&&x.nat.on){
      const cats=t('nat_cats');
      EXC.push({k:'nat',label:t('exc_nat_t'),
        info:[x.nat.country,(cats&&cats[x.nat.cat])||'',x.nat.desc||''].filter(Boolean).join(' · ')});
    }
    if(x.aetr&&x.aetr.on){ EXC.push({k:'aetr',label:t('exc_aetr_t'),info:''}); N.push({msg:t('n_aetr'),art:'AETR'}); }
    if(exempt) N.push({msg:t('n_exempt'),art:'Art. 3 / 13 / 14'});

    // ---- daily driving limit with Art.12 tolerance ----
    let dailyBase = (extByWeek[wk]<2) ? 10 : 9;
    let a12extra = 0, a12max = 0;
    if(x.a12&&x.a12.on){
      a12max = x.a12.break30 ? 120 : 60;
      a12extra = Math.min(parseFloat(x.a12.extra)||0, 1000);
      EXC.push({k:'a12',label:t('exc_a12_t'),info:(x.a12.reason||'')});
      N.push({msg:t('n_a12',{x:a12extra}),art:'Art. 12'});
      if(a12extra>a12max) V.push({msg:t('v_a12_over',{x:a12extra,lim:a12max}),art:'Art. 12',sev:'bad'});
      if(!x.a12.noted) V.push({msg:t('v_a12_note'),art:'Art. 12',sev:'warn'});
      if(x.a12.type==='home') N.push({msg:t('v_a12_comp'),art:'Art. 12'});
    }
    const dailyLimit = dailyBase + Math.min(a12extra,a12max)/60;

    if(!exempt){
      if(drv>dailyLimit+0.001){
        V.push({msg:t('v_driving_abs',{x:drv.toFixed(1),lim:dailyLimit.toFixed(1)}),art:'Art. 6(1)',sev:'bad'});
      }
      if(drv>9.001 && drv<=10.001){
        extByWeek[wk]++;
        if(extByWeek[wk]>2) V.push({msg:t('v_driving_ext',{wk}),art:'Art. 6(1)',sev:'bad'});
      }
      // breaks — multi-manning still requires the break, but it may be taken while the co-driver drives
      if(drv>4.5 && brk<45){
        V.push({msg:t('v_break_missing',{x:drv.toFixed(1),y:brk}),art:'Art. 7',sev:'bad'});
      }
    }

    // ---- multi-manning ----
    const mm = !!(x.mm&&x.mm.on);
    if(mm){
      EXC.push({k:'mm',label:t('exc_mm_t'),info:[x.mm.co||'',x.mm.from||''].filter(Boolean).join(' · ')});
      N.push({msg:t('n_mm'),art:'Art. 4(o), 8(5)'});
    }

    // ---- ferry / train ----
    const ferry = !!(x.ferry&&x.ferry.on);
    let ferryOk=true;
    if(ferry){
      const cnt=parseInt(x.ferry.count)||0, mins=parseInt(x.ferry.mins)||0;
      EXC.push({k:'ferry',label:t('exc_ferry_t'),
        info:(x.ferry.kind==='weekly'?t('exc_ferry_kind_weekly'):t('exc_ferry_kind_daily'))+' · '+cnt+'× / '+mins+' '+t('unit_min')});
      if(cnt>2){ V.push({msg:t('v_ferry_count',{x:cnt}),art:'Art. 9(1)',sev:'bad'}); ferryOk=false; }
      if(mins>60){ V.push({msg:t('v_ferry_mins',{x:mins}),art:'Art. 9(1)',sev:'bad'}); ferryOk=false; }
      if(!x.ferry.couch){ V.push({msg:t('v_ferry_couch'),art:'Art. 9(1)',sev:'bad'}); ferryOk=false; }
      if(ferryOk) N.push({msg:t('n_ferry_ok'),art:'Art. 9(1)'});
    }

    // ---- 12-day rule ----
    let weeklyDeadline = 6;
    if(x.d12&&x.d12.on){
      EXC.push({k:'d12',label:t('exc_12d_t'),info:x.d12.since||''});
      if(x.d12.conf){ weeklyDeadline = 12; twelveDayActive = e.date; N.push({msg:t('n_12d'),art:'Art. 8(6a)'}); }
    }

    // ---- period counter ----
    if(!exempt) periodsSinceWeekly++;

    // ---- rest evaluation ----
    const rh = e.restHours||0;
    switch(e.restType){
      case 'regular11':
        if(rh<10.999 && !(ferry&&ferryOk)) V.push({msg:t('v_short_rest',{x:rh}),art:'Art. 8(2)',sev:'bad'});
        break;
      case 'reduced9':
        if(rh<8.999) V.push({msg:t('v_reduced_short',{x:rh}),art:'Art. 8(4)',sev:'bad'});
        reducedDaily++;
        if(reducedDaily>3) V.push({msg:t('v_reduced_too_many',{x:reducedDaily}),art:'Art. 8(4)',sev:'bad'});
        break;
      case 'split':
        if(rh<11.999) V.push({msg:t('v_split_short'),art:'Art. 8(3)',sev:'bad'});
        break;
      case 'mm9':
        if(rh<8.999) V.push({msg:t('v_mm_short',{x:rh}),art:'Art. 8(5)',sev:'bad'});
        break;
      case 'weekly-regular':
        if(rh<44.999) V.push({msg:t('v_wreg_short'),art:'Art. 8(6)',sev:'bad'});
        weeklyRestHistory.push({date:e.date,type:'regular',hours:rh});
        reducedDaily=0; periodsSinceWeekly=0;
        break;
      case 'weekly-reduced':
        if(rh<23.999) V.push({msg:t('v_wk_under24'),art:'Art. 8(6)',sev:'bad'});
        if(rh<44.999){
          comps.push({id:'c'+e.id, sourceDate:e.date, sourceWeek:wk,
            owedHours:+(45-rh).toFixed(1), appliedHours:0, deadline:fmt(addWeeks(sundayOf(e.date),3))});
        }
        weeklyRestHistory.push({date:e.date,type:'reduced',hours:rh});
        // two consecutive reduced weekly rests
        if(weeklyRestHistory.length>=2){
          const prev=weeklyRestHistory[weeklyRestHistory.length-2];
          if(prev.type==='reduced') V.push({msg:t('v_two_reduced'),art:'Art. 8(6)',sev:'bad'});
        }
        reducedDaily=0; periodsSinceWeekly=0;
        break;
    }

    // ---- workday length vs. the 24h rest window (Art. 8(2)) ----
    // A new daily rest must start within 24h of the end of the previous one. If the working
    // day is long enough that not even the shortest allowed rest (9h, reduced) still fits
    // inside that 24h window, the day is a violation regardless of what rest follows.
    // If a full 24h window is left but the driver then only takes a *reduced* rest, that's
    // fine — reduced daily rest is designed for exactly this. It only breaks down once the
    // declared rest is meant to be a full regular one (≥11h) and the maths no longer fit.
    if(!exempt){
      if(workdayH>15.001){
        V.push({msg:t('v_workday_over15',{x:workdayH.toFixed(1)}),art:'Art. 8(2)',sev:'bad'});
      }else if(workdayH>13.001 && (e.restType==='regular11'||e.restType==='split')){
        V.push({msg:t('v_workday_over13_reg',{x:workdayH.toFixed(1)}),art:'Art. 8(2)',sev:'bad'});
      }
    }

    if(!exempt && periodsSinceWeekly>weeklyDeadline){
      V.push({msg:t('v_week_late',{x:periodsSinceWeekly,lim:weeklyDeadline}),art:'Art. 8(6)',sev:'bad'});
    }

    const pairInfo = pairFor(weekSums, e.date);
    evals[e.id]={
      date:e.date, drv, brk, km, exempt, wk,
      workdayH:hoursBetween(e.start,e.end),
      dailyLimit, extUsed:extByWeek[wk], reducedUsed:reducedDaily,
      periodsSinceWeekly, weeklyDeadline,
      weekDrv:weekSums[wk]||0, pairDrv:pairInfo.pairSum,
      viol:V, notes:N, exc:EXC
    };
    V.forEach(v=>allViol.push({date:e.date,msg:v.msg,art:v.art,sev:v.sev||'bad'}));
  });

  DATA.compensations=comps;
  entries.forEach(e=>{
    if(e.compAppliedHours>0){
      let rem=e.compAppliedHours;
      DATA.compensations.filter(c=>c.owedHours-c.appliedHours>0.001 && c.sourceDate<=e.date)
        .sort((a,b)=>a.deadline.localeCompare(b.deadline))
        .forEach(c=>{ if(rem<=0) return; const take=Math.min(c.owedHours-c.appliedHours,rem); c.appliedHours+=take; rem-=take; });
    }
  });
  const today=fmt(new Date());
  DATA.compensations.forEach(c=>{
    const left=+(c.owedHours-c.appliedHours).toFixed(1);
    if(left>0.05 && c.deadline<today)
      allViol.push({date:c.deadline,msg:t('v_comp_overdue',{d:c.sourceDate,x:left,dl:c.deadline}),art:'Art. 8(6)',sev:'bad'});
  });

  Object.keys(weekSums).forEach(w=>{
    if(weekSums[w]>56.001) allViol.push({date:w,msg:t('v_week_over56',{x:weekSums[w].toFixed(1),wk:w}),art:'Art. 6(2)',sev:'bad'});
  });
  const wl=Object.keys(weekSums).sort();
  for(let i=1;i<wl.length;i++){
    const p=weekSums[wl[i]]+weekSums[wl[i-1]];
    if(p>90.001) allViol.push({date:wl[i],msg:t('v_pair_over90',{x:p.toFixed(1)}),art:'Art. 6(3)',sev:'bad'});
  }

  // current allowance state (based on the latest entry)
  const lastRef = entries.length? entries[entries.length-1].date : fmt(new Date());
  const curWk = weekKey(lastRef);
  const state={
    extUsed: extByWeek[curWk]||0,
    reducedUsed: reducedDaily,
    periodsSinceWeekly, weeklyDeadline: (twelveDayActive?12:6),
    twelveDayActive,
    weeklyRestHistory
  };

  return { entries, weekSums, evals, violations:allViol, state };
}
function pairFor(weekSums, ref){
  const wk=weekKey(ref), thisSum=weekSums[wk]||0;
  const pm=mondayOf(ref); pm.setDate(pm.getDate()-7);
  const prevWk=weekKey(fmt(pm)), prevSum=weekSums[prevWk]||0;
  return { wk, prevWk, thisSum, prevSum, pairSum:thisSum+prevSum };
}

/* ============ Auto daily-rest between days ============ */
function restGapHours(prevDate, prevEnd, date, start){
  if(!prevDate||!prevEnd||!date||!start) return null;
  const a=new Date(prevDate+'T'+prevEnd+':00'), b=new Date(date+'T'+start+':00');
  if(isNaN(a)||isNaN(b)) return null;
  const h=(b-a)/3600000;
  return (h>0 && h<24*14)? h : null;
}
function prevEntryBefore(date, excludeId){
  const list=DATA.entries.filter(e=>e.date<date && e.id!==excludeId).sort((a,b)=>a.date.localeCompare(b.date));
  return list.length? list[list.length-1] : null;
}
function classifyRest(h){
  if(h>=45) return 'weekly-regular';
  if(h>=24) return 'weekly-reduced';
  if(h>=11) return 'regular11';
  if(h>=9) return 'reduced9';
  return 'none';
}
function updateRestCalc(){
  const out=document.getElementById('restCalcOut'); if(!out) return;
  const date=document.getElementById('f_date').value;
  const start=document.getElementById('f_start').value;
  const editId=document.getElementById('f_editId').value||null;
  const prev=prevEntryBefore(date, editId);
  if(!prev||!prev.end){ out.style.display='none'; return; }
  const gap=restGapHours(prev.date, prev.end, date, start);
  if(gap===null){ out.style.display='none'; return; }
  const rl=t('rest_labels'); const type=classifyRest(gap);
  out.style.display='block';
  out.textContent=t('rest_auto',{d:prev.date, x:gap.toFixed(1)})+' ('+t('rest_auto_type')+': '+((rl&&rl[type])||type)+')';
}

/* ============ Tacho disc (24h dial) ============ */
function timeToAngle(tm){ const [h,m]=tm.split(':').map(Number); return ((h||0)+(m||0)/60)/24*360; }
function discArc(cx,cy,r,a0,a1,color,w,opacity){
  let sweep=a1-a0; if(sweep<=0) sweep+=360; if(sweep>=359.9) sweep=359.9;
  const p0=polar(cx,cy,r,a0), p1=polar(cx,cy,r,a0+sweep);
  return `<path d="M ${p0.x.toFixed(1)} ${p0.y.toFixed(1)} A ${r} ${r} 0 ${sweep>180?1:0} 1 ${p1.x.toFixed(1)} ${p1.y.toFixed(1)}" fill="none" stroke="${color}" stroke-width="${w}" ${opacity?`opacity="${opacity}"`:''} stroke-linecap="butt"/>`;
}
function discSVG(e,ev){
  const cx=110,cy=110;
  let ticks='';
  for(let h=0;h<24;h++){
    const maj=h%6===0, a=h/24*360;
    const p1=polar(cx,cy,maj?88:93,a), p2=polar(cx,cy,100,a);
    ticks+=`<line x1="${p1.x.toFixed(1)}" y1="${p1.y.toFixed(1)}" x2="${p2.x.toFixed(1)}" y2="${p2.y.toFixed(1)}" stroke="var(--text-faint)" stroke-width="${maj?2:1}"/>`;
    if(maj){ const pt=polar(cx,cy,78,a);
      ticks+=`<text x="${pt.x.toFixed(1)}" y="${(pt.y+3.5).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono" font-size="10" fill="var(--text-dim)">${h}</text>`; }
  }
  let acts='';
  if(e.start&&e.end){
    const s=timeToAngle(e.start); let en=timeToAngle(e.end); if(en<=s) en+=360;
    const total=en-s;
    const workMin=Math.max(1, ev.workdayH*60);
    const drvMin=Math.min(workMin, ev.drv*60);
    const brkMin=Math.min(workMin-drvMin, ev.brk||0);
    const othMin=Math.max(0, workMin-drvMin-brkMin);
    const dA=total*drvMin/workMin, oA=total*othMin/workMin, bA=total*brkMin/workMin;
    let a=s;
    acts+=discArc(cx,cy,56,0,359.9,'var(--border)',14,0.55); // rest ring
    if(dA>0.5){ acts+=discArc(cx,cy,56,a,a+dA,'var(--accent)',14); a+=dA; }
    if(oA>0.5){ acts+=discArc(cx,cy,56,a,a+oA,'var(--text-faint)',14); a+=oA; }
    if(bA>0.5){ acts+=discArc(cx,cy,56,a,a+bA,'var(--ok)',14); }
    const ps=polar(cx,cy,68,s), pe=polar(cx,cy,68,en);
    acts+=`<line x1="${cx}" y1="${cy}" x2="${ps.x.toFixed(1)}" y2="${ps.y.toFixed(1)}" stroke="var(--text-dim)" stroke-width="1" opacity="0.5"/>`;
    acts+=`<line x1="${cx}" y1="${cy}" x2="${pe.x.toFixed(1)}" y2="${pe.y.toFixed(1)}" stroke="var(--text-dim)" stroke-width="1" opacity="0.5"/>`;
  }
  return `<svg viewBox="0 0 220 220">
    <circle cx="${cx}" cy="${cy}" r="103" fill="var(--bg-panel-2)" stroke="var(--border)" stroke-width="2"/>
    <circle cx="${cx}" cy="${cy}" r="70" fill="none" stroke="var(--border-soft)" stroke-width="1"/>
    ${ticks}${acts}
    <circle cx="${cx}" cy="${cy}" r="30" fill="var(--bg-panel)" stroke="var(--border)" stroke-width="1.5"/>
    <text x="${cx}" y="${cy-4}" text-anchor="middle" font-family="JetBrains Mono" font-size="9.5" fill="var(--text-dim)">${e.date.slice(5)}</text>
    <text x="${cx}" y="${cy+11}" text-anchor="middle" font-family="JetBrains Mono" font-size="13" font-weight="700" fill="var(--accent)">${ev.drv.toFixed(1)}h</text>
  </svg>`;
}

/* ============ Gauge ============ */
function polar(cx,cy,r,d){ const a=(d-90)*Math.PI/180; return {x:cx+r*Math.cos(a),y:cy+r*Math.sin(a)}; }
function arcPath(cx,cy,r,s,e){ const a=polar(cx,cy,r,e),b=polar(cx,cy,r,s); return `M ${a.x} ${a.y} A ${r} ${r} 0 ${e-s<=180?0:1} 0 ${b.x} ${b.y}`; }
function gauge(label,val,max,unit){
  const s=-120,e=120,fill=s+Math.min(val/max,1)*(e-s),r=val/max;
  const col=r>=1?'var(--bad)':(r>=0.85?'var(--warn)':'var(--ok)');
  return `<svg viewBox="0 0 150 110">
   <path d="${arcPath(75,80,60,s,e)}" fill="none" stroke="var(--border)" stroke-width="10" stroke-linecap="round"/>
   <path d="${arcPath(75,80,60,s,fill)}" fill="none" stroke="${col}" stroke-width="10" stroke-linecap="round"/>
   <text x="75" y="72" text-anchor="middle" font-family="JetBrains Mono" font-size="20" font-weight="700" fill="var(--text)">${val.toFixed(1)}</text>
   <text x="75" y="90" text-anchor="middle" font-family="Inter" font-size="9" fill="var(--text-dim)">/ ${max} ${unit}</text>
  </svg><div class="gauge-label">${label}</div>`;
}
function tokens(used,total){
  let h='<div class="tokens">';
  for(let i=0;i<total;i++) h+=`<div class="tok ${i<used?'used':'free'}"></div>`;
  return h+'</div>';
}

     <div class="field-row">
       <div><label>${t('seg_odo_start')}</label><input type="number" inputmode="numeric" data-i="${i}" data-f="odoStart" value="${s.odoStart}"></div>
       <div><label>${t('seg_odo_end')}</label><input type="number" inputmode="numeric" data-i="${i}" data-f="odoEnd" value="${s.odoEnd}"></div>
     </div>
     <div class="field-row">
       <div><label>${t('seg_drv_start')}</label><input type="text" inputmode="numeric" placeholder="0:00" data-i="${i}" data-f="drvStart" value="${s.drvStart}"></div>
       <div><label>${t('seg_drv_end')}</label><input type="text" inputmode="numeric" placeholder="0:00" data-i="${i}" data-f="drvEnd" value="${s.drvEnd}"></div>
     </div>
     <div class="field-row">
       <div><label>${t('seg_rest_start')}</label><input type="text" inputmode="numeric" placeholder="0:00" data-i="${i}" data-f="restStart" value="${s.restStart}"></div>
       <div><label>${t('seg_rest_end')}</label><input type="text" inputmode="numeric" placeholder="0:00" data-i="${i}" data-f="restEnd" value="${s.restEnd}"></div>
     </div>
     <div class="calc-out" data-calc="${i}">${segCalcText(s)}</div>
     <div class="hint">${t('seg_hint')}</div>`;
    w.appendChild(d);
  });
  const HMF=['drvStart','drvEnd','restStart','restEnd'];
  w.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input',ev=>{
      const i=+ev.target.dataset.i,f=ev.target.dataset.f;
      if(HMF.indexOf(f)>=0){
        const atEnd = ev.target.selectionStart===ev.target.value.length;
        const masked=maskHM(ev.target.value);
        if(masked!==ev.target.value){
          ev.target.value=masked;
          if(atEnd) ev.target.setSelectionRange(masked.length,masked.length);
        }
      }
      currentSegments[i][f]=ev.target.value;
      const o=w.querySelector(`[data-calc="${i}"]`); if(o) o.textContent=segCalcText(currentSegments[i]);
    });
    inp.addEventListener('blur',ev=>{
      const i=+ev.target.dataset.i,f=ev.target.dataset.f;
      if(HMF.indexOf(f)<0) return;
      const n=normalizeHM(ev.target.value);
      ev.target.value=n; currentSegments[i][f]=n;
      const o=w.querySelector(`[data-calc="${i}"]`); if(o) o.textContent=segCalcText(currentSegments[i]);
    });
  });
  w.querySelectorAll('.seg-remove').forEach(b=>{
    b.addEventListener('click',ev=>{ currentSegments.splice(+ev.currentTarget.dataset.i,1); renderSegments(); });
  });
}

  // tacho disc for the latest day
  const lastE=R.entries[R.entries.length-1];
  const discEl=document.getElementById('discCard');
  if(discEl) discEl.innerHTML = lastE

     <div class="allow-r">${tokens(S.extUsed,2)}<span class="pill ${extLeft===0?'warn':'ok'}">${extLeft} ${t('left')}</span></div>
   </div>
   <div class="allow-row">
     <div class="allow-l"><b>${t('allow_red_t')}</b><span>${t('allow_red_d')}</span></div>
     <div class="allow-r">${tokens(S.reducedUsed,3)}<span class="pill ${redLeft===0?'warn':'ok'}">${redLeft} ${t('left')}</span></div>
   </div>
   <div class="allow-row">
     <div class="allow-l"><b>${t('allow_wred_t')}</b><span>${t('allow_wred_d')}</span></div>
     <div class="allow-r"><span class="pill ${wh.length&&!regInPair?'bad':'ok'}">${wredTxt}</span></div>
   </div>
   <div class="allow-row">
     <div class="allow-l"><b>${t('allow_wdead_t')}</b><span>${S.weeklyDeadline===12? t('allow_12d') : t('allow_wdead_d')}</span></div>
     <div class="allow-r"><span class="pill ${S.periodsSinceWeekly>=S.weeklyDeadline?'bad':(S.periodsSinceWeekly>=S.weeklyDeadline-1?'warn':'ok')}">${S.periodsSinceWeekly} / ${S.weeklyDeadline}</span></div>
   </div>`;

   <div class="res-line"><span>${t('rest_days')}</span><span>${S.periodsSinceWeekly} / ${S.weeklyDeadline}</span></div>
   <div class="res-line"><span>${t('rest_left')}</span><span class="pill ${daysLeft<=0?'bad':(daysLeft<=1?'warn':'ok')}">${daysLeft} ${t('unit_days')}</span></div>
   <div class="res-line"><span>${t('allow_ext_t')}</span><span>${S.extUsed} / 2</span></div>
   <div class="res-line"><span>${t('allow_red_t')}</span><span>${S.reducedUsed} / 3</span></div>`;

  const today=fmt(new Date());
  const open=DATA.compensations.filter(c=>c.owedHours-c.appliedHours>0.05);
  document.getElementById('compStatus').innerHTML = open.length===0
   ? `<div class="section-note">${t('no_comp')}</div>`
   : open.map(c=>`<div class="res-line"><span>${c.sourceDate} — ${t('comp_deadline')} ${c.deadline}</span>
      <span class="pill ${c.deadline<today?'bad':'warn'}">${(c.owedHours-c.appliedHours).toFixed(1)} ${t('unit_hours')}</span></div>`).join('');

  const last14=R.entries.slice(-14);
  document.getElementById('stripChart').innerHTML = last14.length===0
   ? `<div class="section-note">${t('no_data')}</div>`
   : last14.map(e=>{
      const ev=R.evals[e.id];

      return `<div class="strip-col"><div class="strip-bar ${c}" style="height:${ht}px" title="${e.date}: ${h.toFixed(1)}${t('unit_hours')}"></div>

     }).join('');

function renderLog(R){
  const el=document.getElementById('logList');
  if(R.entries.length===0){ el.innerHTML=`<div class="empty">${t('log_empty')}</div>`; return; }
  el.innerHTML=[...R.entries].reverse().map(e=>{
    const ev=R.evals[e.id];
    const plates=(e.segments||[]).map(s=>s.plate).filter(Boolean);
    const rl=t('rest_labels'); const restLabel=(rl&&rl[e.restType])||'';
    const route=[e.startPlace,e.startCountry].filter(Boolean).join(' ')+
      (e.endPlace||e.endCountry? ' → '+[e.endPlace,e.endCountry].filter(Boolean).join(' '):'');
    const badge = ev.exempt? `<span class="pill info">${t('exempt_badge')}</span>`
      : `<span class="pill ${ev.viol.length?'bad':'ok'}">${ev.viol.length? ev.viol.length+' '+t('viol_count') : t('ok_status')}</span>`;
    return `<div class="log-entry ${openDetails[e.id]?'open':''}" id="le-${e.id}">
      <div class="log-sum" onclick="toggleDetail('${e.id}')">
        <div class="log-top">
          <span class="log-date"><svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 6l6 6-6 6"/></svg>${e.date}</span>
          ${badge}
        </div>
        <div class="log-meta">
          <span class="log-stat">${e.start}–${e.end}</span>
          <span class="log-stat">▶ ${ev.drv.toFixed(1)}${t('unit_hours')}</span>
          ${ev.brk?`<span class="log-stat">❚❚ ${minToHM(ev.brk)}</span>`:''}
          ${ev.km?`<span class="log-stat">${ev.km} ${t('unit_km')}</span>`:''}
          ${plates.map(x=>`<span class="log-stat plate">${x}</span>`).join('')}
          ${restLabel?`<span class="log-stat">${restLabel}${e.restHours?' '+e.restHours+t('unit_hours'):''}</span>`:''}
          ${ev.exc.map(x=>`<span class="log-stat exc">⚑ ${x.label.split('—')[0].trim()}</span>`).join('')}

      <div class="log-detail">${detailHTML(e,ev,R)}</div>
    </div>`;
  }).join('');
}

      <div class="det-line"><span>${t('r_driving')}</span><span>${ev.drv.toFixed(1)} ${t('unit_hours')}</span></div>

      <div class="det-line"><span>${t('r_rem_week')}</span><span>${Math.max(0,56-ev.weekDrv).toFixed(1)} ${t('unit_hours')}</span></div>
      <div class="det-line"><span>${t('r_rem_pair')}</span><span>${Math.max(0,90-p.pairSum).toFixed(1)} ${t('unit_hours')}</span></div>

function toggleDetail(id){
  openDetails[id]=!openDetails[id];
  const el=document.getElementById('le-'+id);
  if(el) el.classList.toggle('open', !!openDetails[id]);
}
window.toggleDetail=toggleDetail;

/* ============ Month ============ */
function renderMonth(R){
  const el=document.getElementById('monthOut'); if(!el) return;
  const mv=document.getElementById('f_month').value;
  if(!mv){ el.innerHTML=''; return; }
  R=R||computeAll();
  const days=R.entries.filter(e=>e.date.startsWith(mv));
  if(days.length===0){ el.innerHTML=`<div class="empty">${t('m_empty')}</div>`; return; }
  const km=days.reduce((s,e)=>s+dayKm(e),0);
  const drv=days.reduce((s,e)=>s+dayDrivingHours(e),0);
  const brk=days.reduce((s,e)=>s+dayBreakMin(e),0);
  const vio=days.reduce((s,e)=>s+(R.evals[e.id]?R.evals[e.id].viol.length:0),0);
  const plates=[...new Set(days.flatMap(e=>(e.segments||[]).map(s=>s.plate).filter(Boolean)))];
  const countries=[...new Set(days.flatMap(e=>[e.startCountry,e.endCountry]).filter(Boolean))];
  const excs=[...new Set(days.flatMap(e=>(R.evals[e.id]?R.evals[e.id].exc.map(x=>x.label):[])))];
  const weeks={}; days.forEach(e=>{ const w=weekKey(e.date); weeks[w]=(weeks[w]||0)+dayDrivingHours(e); });
  el.innerHTML=`
   <div class="stat-grid">
     <div class="big-stat"><div class="v">${Math.round(km).toLocaleString()}</div><div class="l">${t('m_km')}</div></div>
     <div class="big-stat"><div class="v">${drv.toFixed(1)}</div><div class="l">${t('m_drv')}</div></div>
     <div class="big-stat"><div class="v">${(brk/60).toFixed(1)}</div><div class="l">${t('m_rest')}</div></div>
     <div class="big-stat"><div class="v">${days.length}</div><div class="l">${t('m_days')}</div></div>
     <div class="big-stat"><div class="v">${(drv/days.length).toFixed(1)}</div><div class="l">${t('m_avg')}</div></div>
     <div class="big-stat"><div class="v" style="color:${vio?'var(--bad)':'var(--ok)'}">${vio}</div><div class="l">${t('m_viol')}</div></div>
   </div>
   <div class="subhead">${t('m_weeks')}</div>
   ${Object.keys(weeks).sort().map(w=>`<div class="res-line"><span>${w}</span><span class="${weeks[w]>56?'pill bad':''}">${weeks[w].toFixed(1)} ${t('unit_hours')}</span></div>`).join('')}
   ${plates.length?`<div class="subhead">${t('m_plates')}</div><div class="log-meta">${plates.map(x=>`<span class="log-stat plate">${x}</span>`).join('')}</div>`:''}
   ${countries.length?`<div class="subhead">${t('m_countries')}</div><div class="log-meta">${countries.map(x=>`<span class="log-stat">${x}</span>`).join('')}</div>`:''}
   ${excs.length?`<div class="subhead">${t('m_exc')}</div><div class="log-meta">${excs.map(x=>`<span class="log-stat exc">⚑ ${x}</span>`).join('')}</div>`:''}`;
}

function fillCountrySelects(){
  ['f_startCountry','f_endCountry'].forEach(id=>{
    const s=document.getElementById(id); const cur=s.value;
    s.innerHTML=countryOptions(cur);
  });
}
function resetForm(){
  document.getElementById('dayForm').reset();
  document.getElementById('f_editId').value='';
  document.getElementById('f_date').value=fmt(new Date());
  document.getElementById('f_startCountry').value=DATA.lastCountry||'';
  document.getElementById('f_endCountry').value=DATA.lastCountry||'';
  currentSegments=[blankSeg(DATA.currentPlate)];
  excState=blankExc();
  renderSegments(); renderExceptions();
  document.getElementById('compApplyWrap').style.display='none';
  document.getElementById('formTitle').textContent=t('add_title');
  document.getElementById('saveBtn').textContent=t('btn_save');
  document.getElementById('cancelEdit').style.display='none';
  updateRestCalc();
}
function editEntry(id){
  const e=DATA.entries.find(x=>x.id===id); if(!e) return;
  document.getElementById('f_editId').value=id;
  document.getElementById('f_date').value=e.date;
  document.getElementById('f_start').value=e.start;
  document.getElementById('f_end').value=e.end;
  document.getElementById('f_startPlace').value=e.startPlace||'';
  document.getElementById('f_endPlace').value=e.endPlace||'';
  document.getElementById('f_startCountry').value=e.startCountry||'';
  document.getElementById('f_endCountry').value=e.endCountry||'';
  document.getElementById('f_restType').value=e.restType;
  document.getElementById('f_restHours').value=e.restHours||'';
  document.getElementById('f_notes').value=e.notes||'';
  document.getElementById('f_applyComp').checked=!!e.compAppliedHours;
  document.getElementById('f_compHours').value=e.compAppliedHours||'';
  document.getElementById('compApplyWrap').style.display=e.compAppliedHours?'block':'none';
  currentSegments=(e.segments||[]).map(s=>({...s,
    odoStart:s.odoStart==null?'':s.odoStart, odoEnd:s.odoEnd==null?'':s.odoEnd}));
  if(!currentSegments.length) currentSegments=[blankSeg('')];
  const b=blankExc();
  excState=Object.assign(b, JSON.parse(JSON.stringify(e.exc||{})));
  Object.keys(b).forEach(k=>{ excState[k]=Object.assign(b[k], (e.exc&&e.exc[k])||{}); });
  renderSegments(); renderExceptions();
  document.getElementById('formTitle').textContent=t('edit_title');
  document.getElementById('saveBtn').textContent=t('btn_update');
  document.getElementById('cancelEdit').style.display='block';
  document.querySelector('.tab-btn[data-tab="add"]').click();
  updateRestCalc();
  window.scrollTo({top:0,behavior:'smooth'});
}
window.editEntry=editEntry;

async function deleteEntry(id){
  if(!confirm(t('det_confirm'))) return;
  DATA.entries=DATA.entries.filter(e=>e.id!==id);
  delete openDetails[id];
  await saveData(); render();
}
window.deleteEntry=deleteEntry;

});
document.getElementById('f_month').addEventListener('change',()=>renderMonth());
document.getElementById('f_date').addEventListener('change',updateRestCalc);
document.getElementById('f_start').addEventListener('input',updateRestCalc);
document.getElementById('cancelEdit').addEventListener('click',()=>{ resetForm(); document.getElementById('resultPanel').style.display='none'; });

document.getElementById('dayForm').addEventListener('submit', async ev=>{
  ev.preventDefault();
  const editId=document.getElementById('f_editId').value;
  const segs=currentSegments.map(s=>({
    plate:(s.plate||'').trim(),
    odoStart:s.odoStart!==''?+s.odoStart:null, odoEnd:s.odoEnd!==''?+s.odoEnd:null,
    drvStart:s.drvStart||'', drvEnd:s.drvEnd||'', restStart:s.restStart||'', restEnd:s.restEnd||''
  }));
  const entry={
    id: editId||('e'+Date.now()),
    date:document.getElementById('f_date').value,
    start:document.getElementById('f_start').value,
    end:document.getElementById('f_end').value,
    startPlace:document.getElementById('f_startPlace').value.trim(),
    startCountry:document.getElementById('f_startCountry').value,
    endPlace:document.getElementById('f_endPlace').value.trim(),
    endCountry:document.getElementById('f_endCountry').value,
    segments:segs,
    restType:document.getElementById('f_restType').value,
    restHours:parseFloat(document.getElementById('f_restHours').value)||0,
    compAppliedHours:document.getElementById('f_applyComp').checked?(parseFloat(document.getElementById('f_compHours').value)||0):0,
    exc:JSON.parse(JSON.stringify(excState)),
    notes:document.getElementById('f_notes').value||''
  };
  const lastPlate=segs.map(s=>s.plate).filter(Boolean).pop();
  if(lastPlate) DATA.currentPlate=lastPlate;
  if(entry.endCountry) DATA.lastCountry=entry.endCountry;

  // auto-record the elapsed daily rest on the previous day
  const prev=prevEntryBefore(entry.date, entry.id);
  if(prev && prev.end){
    const gap=restGapHours(prev.date, prev.end, entry.date, entry.start);
    // these types are inferred purely from elapsed hours, so keep them in sync with
    // the real gap every time a new day narrows it down. Types the driver had to
    // deliberately declare (split / multi-manning / weekly) are never overwritten,
    // since a matching gap length doesn't prove that's what actually happened.
    const AUTO_DERIVABLE=['none','regular11','reduced9',''];
    if(gap!==null && (!prev.restType || AUTO_DERIVABLE.indexOf(prev.restType)>=0)){
      prev.restHours=+gap.toFixed(1);
      prev.restType=classifyRest(gap);
    }
  }

  if(editId){ DATA.entries=DATA.entries.map(x=>x.id===editId?entry:x); }
  else DATA.entries.push(entry);
  await saveData();
  const R=render();
  const evv=R.evals[entry.id];
  const p=pairFor(R.weekSums,entry.date);
  const route=[entry.startPlace,entry.startCountry].filter(Boolean).join(' ')+' → '+[entry.endPlace,entry.endCountry].filter(Boolean).join(' ');

  const panel=document.getElementById('resultPanel');
  panel.style.display='block';
  panel.innerHTML=`
   <h3>${t('result_title')} ${entry.date}</h3>
   ${route.trim()!=='→'?`<div class="res-line"><span>${t('r_route')}</span><span>${route}</span></div>`:''}
   <div class="res-line"><span>${t('r_workday')}</span><span>${evv.workdayH.toFixed(1)} ${t('unit_hours')}</span></div>
   <div class="res-line"><span>${t('r_driving')}</span><span>${evv.drv.toFixed(1)} ${t('unit_hours')}</span></div>
   <div class="res-line"><span>${t('r_limit')}</span><span>${evv.dailyLimit.toFixed(1)} ${t('unit_hours')}</span></div>
   ${evv.brk?`<div class="res-line"><span>${t('r_breaks')}</span><span>${minToHM(evv.brk)}</span></div>`:''}
   ${evv.km?`<div class="res-line"><span>${t('r_km')}</span><span>${evv.km} ${t('unit_km')}</span></div>`:''}
   <div class="res-line"><span>${t('r_rem_week')}</span><span>${Math.max(0,56-p.thisSum).toFixed(1)} ${t('unit_hours')}</span></div>
   <div class="res-line"><span>${t('r_rem_pair')}</span><span>${Math.max(0,90-p.pairSum).toFixed(1)} ${t('unit_hours')}</span></div>
   <div class="res-line"><span>${t('r_ext_left')}</span><span>${Math.max(0,2-evv.extUsed)} ${t('of')} 2</span></div>
   <div class="res-line"><span>${t('r_reduced_left')}</span><span>${Math.max(0,3-evv.reducedUsed)} ${t('of')} 3</span></div>
   <div class="res-line"><span>${t('r_days_left')}</span><span>${Math.max(0,evv.weeklyDeadline-evv.periodsSinceWeekly)} / ${evv.weeklyDeadline}</span></div>
   <div class="res-line"><span>${t('r_next_week')}</span><span>${Math.max(0,90-p.thisSum).toFixed(1)} ${t('unit_hours')}</span></div>
   ${evv.exc.length?`<div class="res-line"><span>${t('r_exc')}</span><span>${evv.exc.map(x=>x.label.split('—')[0].trim()).join(', ')}</span></div>`:''}
   <div class="res-line"><span>${t('r_viol')}</span><span class="pill ${evv.viol.length?'bad':'ok'}">${evv.viol.length||'0'}</span></div>
   ${evv.viol.map(v=>`<div style="font-size:12.5px;color:var(--bad);margin-top:6px;line-height:1.45;">• ${v.msg} <span style="color:var(--text-faint);font-family:var(--mono);font-size:10.5px;">${v.art}</span></div>`).join('')}
   ${evv.notes.map(n=>`<div style="font-size:12.5px;color:var(--text-dim);margin-top:6px;line-height:1.45;">ℹ ${n.msg}</div>`).join('')}`;
  resetForm();
});

/* ============ Backup ============ */
document.getElementById('exportBtn').addEventListener('click',()=>{
  const b=new Blob([JSON.stringify(DATA,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download='tacho561-backup-'+fmt(new Date())+'.json'; a.click(); URL.revokeObjectURL(a.href);
});
document.getElementById('importBtn').addEventListener('click',()=>document.getElementById('importFile').click());
document.getElementById('importFile').addEventListener('change',ev=>{
  const f=ev.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=async()=>{
    try{
      const p=JSON.parse(r.result); if(!p.entries) throw 0;
      DATA=p; DATA.compensations=DATA.compensations||[]; DATA.currentPlate=DATA.currentPlate||''; DATA.lastCountry=DATA.lastCountry||'';
      await saveData(); resetForm(); render(); alert(t('import_ok'));
    }catch(e){ alert(t('import_err')); }
  };
  r.readAsText(f);
});

/* ============ Install ============ */
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{ e.preventDefault(); deferredPrompt=e;
  document.getElementById('installBtn').style.display='block'; });
document.getElementById('installBtn').addEventListener('click',async()=>{
  if(!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt=null;
  document.getElementById('installBtn').style.display='none';
});
(function injectManifest(){
  const icon="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%2312161d'/%3E%3Ccircle cx='256' cy='256' r='165' fill='none' stroke='%23f2994a' stroke-width='28'/%3E%3Cpath d='M256 148v114l74 46' fill='none' stroke='%23f2994a' stroke-width='32' stroke-linecap='round'/%3E%3C/svg%3E";
  const m={name:'Tacho 561',short_name:'Tacho 561',start_url:'.',scope:'.',display:'standalone',
    background_color:'#12161d',theme_color:'#12161d',orientation:'portrait-primary',
    icons:[{src:icon,sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
  try{
    const b=new Blob([JSON.stringify(m)],{type:'application/manifest+json'});
    const l=document.createElement('link'); l.rel='manifest'; l.href=URL.createObjectURL(b);
    document.head.appendChild(l);
  }catch(e){}
})();

document.querySelectorAll('.tab-btn').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('view-'+b.dataset.tab).classList.add('active');
  });
});
document.querySelectorAll('#langpick button').forEach(b=>{
  b.addEventListener('click',()=>{ LANG=b.dataset.lang;
    try{ localStorage.setItem('t561-lang',LANG); }catch(e){} applyLang(); });
});
document.querySelectorAll('#themepick button').forEach(b=>{
  b.addEventListener('click',()=>{ THEME=b.dataset.theme;
    try{ localStorage.setItem('t561-theme',THEME); }catch(e){} applyTheme(); });
});

(async function init(){
  await loadData();
  applyTheme();
  const now=new Date();
  document.getElementById('f_date').value=fmt(now);
  document.getElementById('f_month').value=fmt(now).slice(0,7);
  currentSegments=[blankSeg(DATA.currentPlate)];
  excState=blankExc();
  applyLang();
  document.getElementById('f_startCountry').value=DATA.lastCountry||'';
  document.getElementById('f_endCountry').value=DATA.lastCountry||'';
})();

</script>
